services:
  - type: web
    name: syl-poto
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: syl-poto-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: syl-poto-db
    plan: free
